<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sklad</title>
<meta name="description" content="Chat em tempo real sem barreiras de idioma: cada pessoa escreve na própria língua e lê na que escolher, com tradução automática. Crie uma sala e compartilhe o link."/>
<meta name="theme-color" content="#0F172A"/>
<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Sklad"/>
<meta property="og:title" content="Sklad — chat em tempo real sem barreiras de idioma"/>
<meta property="og:description" content="Cada pessoa escreve na própria língua e lê na que escolher, com tradução automática. Crie uma sala e compartilhe o link."/>
<meta property="og:url" content="https://marccusph.github.io/sklad/"/>
<meta property="og:locale" content="pt_BR"/>
<meta name="twitter:card" content="summary"/>
<meta name="twitter:title" content="Sklad — chat em tempo real sem barreiras de idioma"/>
<meta name="twitter:description" content="Cada pessoa escreve na própria língua e lê na que escolher, com tradução automática. Crie uma sala e compartilhe o link."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #F4F6FA;
  --surface: #FFFFFF;
  --sf2:     #F8F9FB;
  --sf3:     #F0F2F7;
  --border:  #E8EAF0;
  --border2: #D1D5DB;
  --t1: #0F172A;
  --t2: #64748B;
  --t3: #94A3B8;
  --dark:  #0F172A;
  --dark2: #1E293B;
  --green: #22C55E;
  --r:  12px;
  --rl: 20px;
  --sh: 0 1px 4px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04);
  --sh2: 0 4px 16px rgba(15,23,42,.09), 0 2px 6px rgba(15,23,42,.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.hidden{display:none!important;}

/* ════════════════════════════════
   AUTH SCREENS  (setup + identity)
════════════════════════════════ */
.auth-shell{
  height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;animation:fadeUp .35s ease both;
}
.auth-card{
  width:100%;max-width:860px;
  background:var(--surface);border-radius:24px;
  box-shadow:var(--sh2);border:1px solid var(--border);
  display:grid;grid-template-columns:260px 1fr;
  overflow:hidden;
}

/* dark left panel */
.auth-left{
  background:var(--dark);padding:40px 32px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.brand{
  display:inline-flex;align-items:center;gap:9px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:8px 14px 8px 10px;
  width:fit-content;margin-bottom:20px;
}
.brand-icon{
  width:26px;height:26px;background:#fff;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--dark);flex-shrink:0;
}
.brand-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.auth-tagline{font-size:14px;color:#94A3B8;line-height:1.7;margin-bottom:24px;}
.lang-chips{display:flex;flex-wrap:wrap;gap:7px;}
.lang-chip{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:20px;padding:5px 11px;
  font-size:12px;color:#CBD5E1;
  display:flex;align-items:center;gap:5px;
}
.auth-footer{font-size:11.5px;color:#475569;}

/* light right panel */
.auth-right{padding:44px 44px;display:flex;flex-direction:column;justify-content:center;}
.auth-title{font-size:21px;font-weight:700;color:var(--t1);margin-bottom:5px;}
.auth-sub{font-size:13.5px;color:var(--t2);line-height:1.6;margin-bottom:30px;}

.sec-lbl{
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:1.6px;color:var(--t3);margin-bottom:11px;
}

/* steps */
.steps{counter-reset:s;margin-bottom:22px;}
.step{
  counter-increment:s;display:flex;gap:11px;
  padding:9px 0;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--t2);line-height:1.6;
}
.step:last-child{border:none;}
.step::before{
  content:counter(s);min-width:20px;height:20px;
  background:var(--dark);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:700;color:#fff;
  flex-shrink:0;margin-top:2px;
}
.step a{color:var(--dark);text-decoration:none;font-weight:500;}
.step a:hover{text-decoration:underline;}
code{
  font-family:'Menlo','Courier New',monospace;font-size:11px;
  background:var(--sf3);padding:2px 6px;border-radius:5px;
  color:var(--t1);border:1px solid var(--border);
}

/* form */
.field{margin-bottom:14px;}
label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;}
textarea,.inp{
  width:100%;background:var(--sf2);border:1.5px solid var(--border);
  border-radius:var(--r);padding:11px 14px;
  color:var(--t1);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
textarea{
  font-family:'Menlo','Courier New',monospace;font-size:11.5px;
  resize:vertical;min-height:130px;line-height:1.6;
}
.inp{height:46px;}
textarea:focus,.inp:focus{
  border-color:var(--dark);box-shadow:0 0 0 3px rgba(15,23,42,.05);
}
textarea::placeholder,.inp::placeholder{color:var(--t3);}

/* button */
.btn{
  width:100%;height:46px;background:var(--dark);color:#fff;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;
  border:none;border-radius:var(--r);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.btn:hover{background:var(--dark2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,23,42,.18);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

.err{
  font-size:13px;color:#DC2626;padding:10px 14px;margin-top:12px;
  background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r);line-height:1.5;
}

/* lang grid */
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.lang-opt{
  padding:11px 14px;background:var(--sf2);
  border:1.5px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:9px;
  font-size:13.5px;font-weight:500;color:var(--t2);user-select:none;
}
.lang-opt:hover{border-color:var(--border2);color:var(--t1);}
.lang-opt.sel{border-color:var(--dark);background:var(--dark);color:#fff;}
.lang-opt .flag{font-size:18px;}

/* lang note box */
.lang-note{
  background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--r);
  padding:10px 14px;margin-bottom:16px;
  font-size:12.5px;color:#1D4ED8;line-height:1.5;
  display:flex;gap:8px;align-items:flex-start;
}

/* ════════════════════════════════
   CHAT LAYOUT
════════════════════════════════ */
.chat-shell{
  height:100vh;display:grid;
  grid-template-columns:240px 1fr;
  overflow:hidden;animation:fadeUp .3s ease both;
}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-top{
  padding:18px 18px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sb-brand{display:flex;align-items:center;gap:8px;}
.sb-brand-badge{
  width:30px;height:30px;background:var(--dark);border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sb-brand-badge span{font-size:11px;font-weight:800;color:#fff;letter-spacing:-.5px;}
.sb-brand-label{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.3px;}

.sb-block{padding:14px 18px;}
.sb-block+.sb-block{border-top:1px solid var(--border);padding-top:12px;}
.sb-block-grow{padding:14px 18px;flex:1;overflow:hidden;display:flex;flex-direction:column;}

/* room row */
.room-row{display:flex;align-items:center;gap:7px;}
.room-id-chip{
  flex:1;font-family:'Menlo','Courier New',monospace;font-size:11px;
  color:var(--t2);background:var(--sf3);
  border:1px solid var(--border);border-radius:8px;
  padding:5px 9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;transition:all .15s;
}
.room-id-chip:hover{border-color:var(--dark);color:var(--dark);}
.icon-btn{
  width:28px;height:28px;background:var(--sf3);border:1px solid var(--border);
  border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--t2);transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{border-color:var(--dark);color:var(--dark);background:var(--surface);}
.new-room-btn{
  width:100%; margin-top:8px;
  display:flex; align-items:center; justify-content:center; gap:6px;
  background:var(--sf2); border:1px dashed var(--border2);
  border-radius:8px; padding:8px 10px; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:600;
  color:var(--t2); transition:all .15s;
}
.new-room-btn:hover{background:var(--surface);border-color:var(--dark);border-style:solid;color:var(--dark);}
.new-room-btn:active{transform:scale(.97);}

/* participants */
.sb-participants{flex:1;overflow-y:auto;}
.sb-participants::-webkit-scrollbar{width:3px;}
.sb-participants::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.participant{
  display:flex;align-items:center;gap:9px;padding:8px 0;
  border-bottom:1px solid var(--border);
}
.participant:last-child{border:none;}
.p-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;flex-shrink:0;
}
.p-info{flex:1;min-width:0;}
.p-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-lang{font-size:11px;color:var(--t3);margin-top:1px;}

/* me bar */
.sb-me{
  padding:13px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:9px;background:var(--sf2);
}
.me-av{
  width:30px;height:30px;background:var(--dark);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;color:#fff;flex-shrink:0;
}
.me-info{flex:1;min-width:0;}
.me-name{font-size:13px;font-weight:600;color:var(--t1);}
.me-lang{font-size:11px;color:var(--t3);margin-top:1px;}
.online-dot{
  width:8px;height:8px;background:var(--green);border-radius:50%;
  border:2px solid var(--surface);margin-left:auto;flex-shrink:0;
  animation:pulse 2s infinite;
}

/* ── CHAT MAIN ── */
.chat-main{
  display:grid;grid-template-rows:56px 1fr auto;
  background:var(--bg);overflow:hidden;
}
.chat-hdr{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;justify-content:space-between;
}
.breadcrumb{font-size:13px;color:var(--t3);display:flex;align-items:center;gap:5px;}
.breadcrumb b{color:var(--t1);font-weight:600;}
.sep{color:var(--t3);}
.live-pill{
  display:flex;align-items:center;gap:6px;background:var(--sf2);
  border:1px solid var(--border);border-radius:20px;
  padding:5px 12px;font-size:12px;color:var(--t2);
}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}

/* messages */
.msgs-area{overflow-y:auto;padding:20px 24px 8px;}
.msgs-area::-webkit-scrollbar{width:4px;}
.msgs-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.empty{
  height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  color:var(--t3);
}
.empty .icon{font-size:44px;margin-bottom:12px;}
.empty p{font-size:14px;line-height:1.7;}

.date-sep{
  text-align:center;margin:14px 0;
  display:flex;align-items:center;gap:10px;
}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.date-sep span{
  font-size:11px;color:var(--t3);font-weight:500;
  background:var(--bg);padding:0 10px;white-space:nowrap;
}

/* message groups */
.msg-group{margin-bottom:16px;animation:msgIn .2s ease both;}

/* other user (left) */
.msg-left{display:flex;gap:10px;}
.msg-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:700;flex-shrink:0;margin-top:3px;
}
.msg-content{max-width:60%;}
.msg-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.msg-name{font-size:12.5px;font-weight:600;color:var(--t1);}
.msg-lang-flag{font-size:13px;}
.msg-time{font-size:11px;color:var(--t3);}
.bubble{
  padding:11px 15px;border-radius:4px 16px 16px 16px;
  font-size:14px;line-height:1.55;border:1px solid transparent;
}

/* own (right) */
.msg-right{display:flex;flex-direction:column;align-items:flex-end;}
.bubble-own{
  max-width:60%;padding:11px 15px;
  border-radius:16px 4px 16px 16px;
  background:var(--dark);color:#F8FAFC;
  font-size:14px;line-height:1.55;
}
.own-time{font-size:11px;color:var(--t3);margin-top:5px;}

/* translation */
.xl-divider{height:1px;background:rgba(0,0,0,.06);margin:8px 0;}
.xl-translated{font-size:13.5px;line-height:1.5;color:var(--t1);}
.xl-badge{
  display:flex;align-items:center;gap:4px;
  margin-top:4px;font-size:10.5px;color:var(--t3);font-weight:500;
}
.xl-original{font-size:11.5px;color:var(--t3);font-style:italic;margin-top:3px;line-height:1.4;}
.xl-loading{
  display:flex;align-items:center;gap:6px;
  margin-top:8px;padding-top:8px;
  border-top:1px solid rgba(0,0,0,.06);
}
.dots span{
  display:inline-block;width:4px;height:4px;
  background:var(--t3);border-radius:50%;
  animation:dotBounce 1.1s infinite;
}
.dots span:nth-child(2){animation-delay:.15s;}
.dots span:nth-child(3){animation-delay:.3s;}

/* input */
.input-zone{background:var(--surface);border-top:1px solid var(--border);padding:13px 24px 15px;}
.input-box{
  display:flex;align-items:flex-end;gap:10px;
  background:var(--sf2);border:1.5px solid var(--border);
  border-radius:14px;padding:9px 10px 9px 16px;
  transition:border-color .15s,box-shadow .15s;
}
.input-box:focus-within{border-color:var(--dark);box-shadow:0 0 0 3px rgba(15,23,42,.05);}
.chat-ta{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:var(--t1);
  resize:none;line-height:1.45;min-height:26px;max-height:100px;padding:2px 0;
}
.chat-ta::placeholder{color:var(--t3);}
.send-btn{
  width:34px;height:34px;background:var(--dark);color:#fff;
  border:none;border-radius:10px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.send-btn:hover{background:var(--dark2);transform:scale(1.06);}
.send-btn:active{transform:scale(.95);}
.input-hint{font-size:11.5px;color:var(--t3);margin-top:7px;padding-left:2px;display:flex;align-items:center;gap:4px;}

/* toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--dark);color:#fff;
  padding:9px 18px;border-radius:20px;font-size:13px;
  box-shadow:var(--sh2);z-index:999;
  animation:toastIn .25s ease both;white-space:nowrap;
}

/* spinner */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}

/* ── VOICE CONTROLS ── */
.mic-btn{
  width:34px;height:34px;background:var(--sf3);color:var(--t2);
  border:1px solid var(--border);border-radius:10px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.mic-btn:hover{border-color:var(--dark);color:var(--dark);background:var(--surface);}
.mic-btn.rec{background:#FEE2E2;border-color:#FCA5A5;color:#DC2626;animation:pulse 1.4s infinite;}
.hdr-btn{
  height:32px;min-width:32px;padding:0 7px;background:var(--sf2);color:var(--t2);
  border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:15px;line-height:1;
  display:flex;align-items:center;justify-content:center;transition:all .15s;margin-left:8px;
}
.hdr-btn:hover{border-color:var(--dark);}
.hdr-btn.on{background:var(--dark);border-color:var(--dark);}

/* ── READING-LANGUAGE POPOVER ── */
.sb-me{cursor:pointer;}
.sb-me:hover{background:var(--sf3);}
.me-caret{opacity:.5;font-size:13px;}
.lang-menu{
  position:fixed;z-index:1000;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh2);
  padding:6px;min-width:172px;animation:fadeUp .15s ease both;
}
.lm-opt{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  font-size:13.5px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .12s;
}
.lm-opt:hover{background:var(--sf2);color:var(--t1);}
.lm-opt.sel{background:var(--dark);color:#fff;}
.lm-opt span:first-child{font-size:16px;}
.lm-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);padding:6px 10px 4px;}
.lm-sep{height:1px;background:var(--border);margin:6px 4px;}
.lm-colors{display:flex;gap:8px;padding:4px 10px 6px;}
.lm-swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
.lm-swatch:hover{transform:scale(1.12);}
.lm-swatch.sel{border-color:var(--t1);box-shadow:0 0 0 2px var(--surface) inset;}

/* ── CONNECTION STATUS ── */
.live-pill.offline{background:#FEF3C7;border-color:#FDE68A;color:#B45309;}
.live-dot.off{background:#F59E0B;animation:none;}
.online-dot.off{background:#F59E0B;}

/* ── VOICE ROOM ENTRY (sidebar) ── */
.voice-enter-btn{
  width:100%; margin-top:8px;
  display:flex; align-items:center; justify-content:center; gap:7px;
  background:var(--dark); border:1px solid var(--dark);
  border-radius:8px; padding:9px 10px; cursor:pointer;
  font-family:'Plus Jakarta Sans',sans-serif; font-size:12px; font-weight:600;
  color:#fff; transition:all .15s;
}
.voice-enter-btn:hover{background:var(--dark2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,23,42,.18);}
.voice-enter-btn:active{transform:translateY(0);}

/* ══ VOICE ROOM (immersive, dark — visibly distinct from the text room) ══ */
.voice-shell{
  height:100vh; display:flex; flex-direction:column;
  background:radial-gradient(120% 80% at 50% 0%, #1E293B 0%, #0F172A 60%, #0B1120 100%);
  color:#E2E8F0; overflow:hidden; animation:fadeUp .3s ease both;
}
.voice-top{
  display:flex; align-items:center; gap:14px;
  padding:16px 22px; border-bottom:1px solid rgba(255,255,255,.08);
}
.voice-room-name{display:flex;align-items:center;gap:8px;font-size:14px;color:#94A3B8;}
.voice-room-name b{color:#fff;font-weight:700;}
.vrn-sep{color:#475569;}
.voice-timer{
  margin-left:auto; font-variant-numeric:tabular-nums;
  font-size:15px; font-weight:700; color:#fff;

<script type="module">
import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

};

// 6 soft pastel palettes — assigned per user deterministically

  {av:'#6D28D9', avBg:'#EDE9FE', bg:'#F5F3FF', bd:'#DDD6FE'},
  {av:'#0369A1', avBg:'#DBEAFE', bg:'#EFF6FF', bd:'#BFDBFE'},
  {av:'#047857', avBg:'#D1FAE5', bg:'#ECFDF5', bd:'#A7F3D0'},

const FB_KEY   = 'sklad_fb_v3';

const LANG_KEY = 'sklad_user_lang';
const COLOR_KEY = 'sklad_user_color';

// Embedded Firebase config — set this to skip the setup screen for everyone.
// Set to null to require manual config (the original flow).
const EMBEDDED_CFG = {
  apiKey: "AIzaSyAACI01tU_8oK88InvCp1Hmoz9GRIUKNRg",
  authDomain: "sklad0.firebaseapp.com",

  projectId: "sklad0",
  storageBucket: "sklad0.firebasestorage.app",
  messagingSenderId: "745604098670",
  appId: "1:745604098670:web:d9be154655fe1e5ef8147f",
  measurementId: "G-BYV0K9DNVM"
};

// ── STATE ─────────────────────────────────────
const S = {
  screen:'setup', db:null, auth:null, authReady:false, roomId:null, user:null,
  messages:[], cache:{}, pending:new Set(),
  unsub:null, connected:true, connWatch:false,
  participants:[], presenceRef:null, presenceUnsub:null, heartbeat:null, roomRef:null, cleanupArmed:null,
  recognizing:false, lastSend:0,
  voice:{ live:[], utterances:[], seen:new Set(), session:null, mic:false,
          recog:null, timer:null, hb:null, unsubs:[], meRef:null, liveWrite:null,
          speakQ:[], speaking:false, closed:false,

// ── FIREBASE ──────────────────────────────────
const loadCfg = () => { try{return JSON.parse(localStorage.getItem(FB_KEY));}catch{return null;} };
const saveCfg = c => { try{localStorage.setItem(FB_KEY,JSON.stringify(c));}catch{} };
function initFb(cfg){

    const app = getApps().length ? getApp() : initializeApp(cfg);
    S.db = getDatabase(app);
    S.auth = getAuth(app);
    return true;
  }catch(e){console.error(e);return false;}

// Anonymous sign-in — resolves with the Firebase user once it's ready.
function ensureAuth(){
  return new Promise((resolve, reject) => {
    let done = false;
    onAuthStateChanged(S.auth, user => {
      if (user && !done){ done = true; S.authReady = true; resolve(user); }
    });
    signInAnonymously(S.auth).catch(e => {
      console.error('[sklad] ❌ anonymous auth failed:', e);
      if (!done){ done = true; reject(e); }

}

// ── ROOM ──────────────────────────────────────
function parseHash(){
  const hash = window.location.hash.slice(1);
  if (!hash) return { room: null, cfg: null };
  // New format: query-string style → #room=xxx&cfg=base64
  if (hash.includes('=')) {
    const p = new URLSearchParams(hash);
    return { room: p.get('room'), cfg: p.get('cfg') };
  }
  // Legacy format: #room-xxx (just the room ID)
  return { room: hash, cfg: null };
}
function buildShareURL(){
  const p = new URLSearchParams();
  if (S.roomId) p.set('room', S.roomId);
  // Only embed config in URL if not already baked into the file
  if (!(EMBEDDED_CFG && EMBEDDED_CFG.databaseURL)) {
    const cfg = loadCfg();
    if (cfg) p.set('cfg', btoa(unescape(encodeURIComponent(JSON.stringify(cfg)))));
  }
  return `${window.location.origin}${window.location.pathname}#${p.toString()}`;
}
function updateURLHash(){
  const p = new URLSearchParams();
  if (S.roomId) p.set('room', S.roomId);
  if (!(EMBEDDED_CFG && EMBEDDED_CFG.databaseURL)) {
    const cfg = loadCfg();
    if (cfg) p.set('cfg', btoa(unescape(encodeURIComponent(JSON.stringify(cfg)))));
  }
  history.replaceState(null, '', '#' + p.toString());
}
function decodeConfigFromURL(b64){
  try { return JSON.parse(decodeURIComponent(escape(atob(b64)))); } catch { return null; }
}
// Strong random room id — rooms are private; only people with the link/id can enter.
function freshRoomId(){
  let rnd = '';
  try { if (crypto.randomUUID) rnd = crypto.randomUUID().replace(/-/g,''); } catch {}
  if (!rnd) rnd = (Math.random().toString(36) + Math.random().toString(36)).replace(/[^a-z0-9]/g,'');
  return 'r-' + rnd.slice(0,14);
}
function getOrMakeRoom(){
  const { room } = parseHash();
  if (room) return room;
  // No room in the URL → start a fresh private room (no shared default).
  return freshRoomId();
}

// ── USER COLOR ────────────────────────────────
function paletteIdxFor(uid){
  // Explicit choice (me, or a participant who picked one) wins; otherwise a stable hash of the id.
  if (S.user && uid === S.user.id && S.user.color != null) return S.user.color % PALETTE.length;
  const p = (S.participants || []).find(x => x.id === uid);
  if (p && typeof p.color === 'number') return p.color % PALETTE.length;
  let h = 0; for (let i = 0; i < uid.length; i++) h = (h * 31 + uid.charCodeAt(i)) | 0;
  return Math.abs(h) % PALETTE.length;
}
function userColor(uid){ return PALETTE[paletteIdxFor(uid)]; }

// ── TRANSLATION ───────────────────────────────
// Primary: Google's public gtx endpoint (auto-detects source, CORS-enabled).
async function googleTranslate(text, targetLang){
  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const data = await r.json();
  // Format: [[["translated","original",...], ...], null, "detected_lang", ...]
  const translated = (data[0] || []).map(seg => seg && seg[0] ? seg[0] : '').join('') || text;
  return { detected: data[2] || targetLang, translated };
}
// Fallback: Lingva (a Google Translate proxy) across a few public instances.
async function lingvaTranslate(text, targetLang){
  const hosts = ['https://lingva.ml', 'https://lingva.lunar.icu', 'https://translate.plausibility.cloud'];
  for (const h of hosts){
    try {
      const r = await fetch(`${h}/api/v1/auto/${targetLang}/${encodeURIComponent(text)}`);
      if (!r.ok) continue;
      const data = await r.json();
      if (data && data.translation) return { detected: (data.info && data.info.detectedSource) || targetLang, translated: data.translation };
    } catch {}
  }
  throw new Error('lingva failed');
}
const FAIL_TTL = 15000; // wait this long before retrying a failed translation
async function translateMessage(text, targetLang){
  const k = `${text}|||${targetLang}`;
  const cached = S.cache[k];
  if (cached && !cached.failed) return cached;
  if (cached && cached.failed && Date.now() - cached.ts < FAIL_TTL) return cached;
  // Primary with one retry, then the fallback provider.
  for (let attempt = 0; attempt < 2; attempt++){
    try { const res = await googleTranslate(text, targetLang); S.cache[k] = res; return res; }
    catch(e){ if (attempt === 0) await new Promise(r => setTimeout(r, 400)); }
  }
  try { const res = await lingvaTranslate(text, targetLang); S.cache[k] = res; return res; }
  catch(e){ console.error('[sklad] translation failed (all providers):', e); }
  // Mark as a transient failure so it retries later instead of caching the original forever.
  const failed = { detected: targetLang, translated: text, failed: true, ts: Date.now() };
  S.cache[k] = failed;
  return failed;
}

async function translatePending(){
  if (!S.user) return;
  const ml = S.user.lang;
  for (const msg of S.messages) {
    const k = `${msg.text}|||${ml}`;
    const c = S.cache[k];
    const good = c && !c.failed;
    const recentFail = c && c.failed && Date.now() - c.ts < FAIL_TTL;
    if (good || recentFail || S.pending.has(k)) continue;
    S.pending.add(k);
    translateMessage(msg.text, ml).then(() => {
      S.pending.delete(k);
      renderMsgs();
      renderParticipants();
    });
  }
}

// ── REALTIME ──────────────────────────────────
function listenMessages(){
  // Detach previous listener if any (prevents stale duplicates on re-entry)
  if (S.unsub) { try { S.unsub(); } catch{} S.unsub = null; }
  console.log('[sklad] 🎧 setting up listener for room:', S.roomId);
  const q = ref(S.db, `rooms/${S.roomId}/messages`);
  const off = onValue(q, snap => {
    const msgs = [];
    snap.forEach(c => {
      const v = c.val();
      if (v && v.text) msgs.push({id: c.key, ...v});
    });
    msgs.sort((a,b) => {
      const ta = a.ts || 0, tb = b.ts || 0;
      if (ta !== tb) return ta - tb;
      return (a.id || '').localeCompare(b.id || '');
    });
    const trimmed = msgs.slice(-100);
    console.log(`[sklad] 📨 onValue fired — received ${trimmed.length} messages`);
    S.messages = trimmed;
    renderMsgs(); renderParticipants(); translatePending();
  }, err => {
    console.error('[sklad] ❌ Firebase listener error:', err);
  });
  S.unsub = off;
}
async function sendMsg(text){
  const t = text.trim();
  if (!t) return;
  const now = Date.now();
  if (now - S.lastSend < SEND_INTERVAL){ toast('⏳ Aguarde um instante entre mensagens.'); return; }
  S.lastSend = now;
  const room = S.roomId;
  // Atomic multi-path write: the message + the user's lastPost, both server-timestamped.
  // The Firebase rules read lastPost to enforce a minimum interval per user.
  const key = push(ref(S.db, `rooms/${room}/messages`)).key;
  const updates = {};
  updates[`rooms/${room}/messages/${key}`] = {
    authorId: S.user.id,
    authorName: S.user.name,
    text: t,
    ts: serverTimestamp(),
  };
  updates[`rooms/${room}/lastPost/${S.user.id}`] = serverTimestamp();
  try {
    await update(ref(S.db), updates);
    console.log('[sklad] ✅ message sent, key:', key);
  } catch(e) {
    console.error('[sklad] ❌ send failed:', e);
    S.lastSend = 0; // a genuine failure shouldn't lock them out for a second
    toast('⚠️ Não enviou. Verifique a conexão ou aguarde um instante.');
  }
}

// ── PRESENCE ──────────────────────────────────
function startPresence(){
  if (!S.db || !S.user || !S.roomId) return;
  stopPresence();
  S.roomRef = ref(S.db, `rooms/${S.roomId}`);
  const meRef = ref(S.db, `rooms/${S.roomId}/presence/${S.user.id}`);
  S.presenceRef = meRef;
  const write = () => set(meRef, presencePayload())
    .catch(e => console.error('[sklad] presence set failed:', e));
  write();
  try { onDisconnect(meRef).remove(); } catch(e){ console.error(e); }
  S.heartbeat = setInterval(write, 25000); // keep ts fresh; stale tabs get filtered out
  const allRef = ref(S.db, `rooms/${S.roomId}/presence`);
  S.presenceUnsub = onValue(allRef, snap => {
    const now = Date.now();
    const list = [];
    snap.forEach(c => {
      const v = c.val();
      if (v && (!v.ts || now - v.ts < 70000)) list.push({ id: c.key, ...v });
    });
    S.participants = list;
    manageRoomCleanup(list.length);
    renderParticipants();
  }, err => console.error('[sklad] presence listener error:', err));
}
// Ephemeral rooms: when I'm the last one here, arm a server-side wipe of the whole
// room (messages + presence + voice) for when I disconnect. Cancel it if others are present.
function manageRoomCleanup(count){
  if (!S.roomRef) return;
  const arm = count <= 1;
  if (arm === S.cleanupArmed) return;
  S.cleanupArmed = arm;
  try {

// ── VOICE (Web Speech API) ────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const TTS_OK = 'speechSynthesis' in window;
let recognition = null;

// ── TTS reliability helpers ───────────────────
// Voices load async (Chrome): preload so the first utterance actually speaks.
let VOICES = [];
function loadVoices(){ try { VOICES = window.speechSynthesis.getVoices() || []; } catch { VOICES = []; } }
function pickVoice(lang){
  const code = (SPEECH_LANG[lang] || lang).toLowerCase();
  const base = code.split('-')[0];
  return VOICES.find(v => v.lang && v.lang.toLowerCase() === code)
      || VOICES.find(v => v.lang && v.lang.toLowerCase().startsWith(base)) || null;
}
let audioUnlocked = false;
// Browsers block audio until a user gesture. Call this from a click/tap (entering
// the voice room or tapping the mic) so later translated speech is allowed to play.
function unlockAudio(){
  if (!TTS_OK || audioUnlocked) return;
  try {
    window.speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(' '); u.volume = 0;
    window.speechSynthesis.speak(u);
    audioUnlocked = true;
  } catch {}
}
if (TTS_OK){ loadVoices(); try { window.speechSynthesis.addEventListener('voiceschanged', loadVoices); } catch {} }

function updateMicUI(){
  const b = document.getElementById('micBtn');
  if (!b) return;
  b.classList.toggle('rec', S.recognizing);
  b.title = S.recognizing ? 'Parar ditado' : 'Falar';
}
function toggleDictation(){
  if (!SR) return;
  if (S.recognizing){ try { recognition.stop(); } catch{} return; }
  recognition = new SR();
  recognition.lang = SPEECH_LANG[S.user.lang] || 'pt-BR';
  recognition.interimResults = true;
  recognition.continuous = false;
  const ta = document.getElementById('chatTa');
  const base = ta ? ta.value.trim() : '';
  recognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    if (ta){
      ta.value = `${base} ${final} ${interim}`.replace(/\s+/g,' ').trim();
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
    }
  };
  recognition.onend   = () => { S.recognizing = false; updateMicUI(); };
  recognition.onerror = () => { S.recognizing = false; updateMicUI(); };
  S.recognizing = true; updateMicUI();
  try { recognition.start(); } catch(e){ S.recognizing = false; updateMicUI(); }
}

// ── VOICE ROOM (real-time translated audio) ───
const voiceRef = path => ref(S.db, `rooms/${S.roomId}/voice/${path}`);

function enterVoice(){
  if (!S.db || !S.user || !S.roomId) return;
  unlockAudio(); // this runs inside the button-tap gesture, so audio is allowed afterwards
  document.addEventListener('pointerdown', unlockAudio, { once: true }); // fallback: first tap anywhere
  S.voice.closed = false;
  S.screen = 'voice';
  render();
  startVoice();
  startCall();
}
function leaveVoice(){
  stopVoice();
  S.screen = 'chat';
  render();
  renderMsgs(); renderParticipants(); updateConnUI();
}

function startVoice(){
  stopVoice();
  S.voice.seen = new Set();
  S.voice.utterances = []; S.voice.live = []; S.voice.caps = [];
  const meRef = voiceRef(`live/${S.user.id}`);
  S.voice.meRef = meRef;
  S.voice.liveWrite = () => ({ name: S.user.name, lang: S.user.lang, color: paletteIdxFor(S.user.id), speaking: !!S.voice.mic, ts: Date.now() });
  set(meRef, S.voice.liveWrite()).catch(e => console.error('[sklad] voice live set failed:', e));
  try { onDisconnect(meRef).remove(); } catch(e){ console.error(e); }
  S.voice.hb = setInterval(() => { if (S.voice.meRef) set(S.voice.meRef, S.voice.liveWrite()).catch(()=>{}); }, 25000);

  S.voice.unsubs.push(onValue(voiceRef('live'), snap => {
    const now = Date.now(); const list = [];
    snap.forEach(c => { const v = c.val(); if (v && (!v.ts || now - v.ts < 70000)) list.push({ id: c.key, ...v }); });
    S.voice.live = list;
    renderVoiceParticipants();
    reconcilePeers();
  }, err => console.error('[sklad] voice live listener error:', err)));

  S.voice.unsubs.push(onValue(voiceRef('session'), snap => {
    S.voice.session = snap.val();
    if (S.voice.session && S.voice.session.open === false){ onVoiceClosed(); return; }
    updateVoiceTimer();
  }));

  S.voice.unsubs.push(onValue(voiceRef('utterances'), snap => {
    const items = []; snap.forEach(c => { const v = c.val(); if (v && v.text) items.push({ id: c.key, ...v }); });
    items.sort((a,b)=>(a.ts||0)-(b.ts||0));
    S.voice.utterances = items.slice(-40);
    for (const u of S.voice.utterances){
      if (S.voice.seen.has(u.id)) continue;
      S.voice.seen.add(u.id);
      handleIncomingUtterance(u);
    }
  }, err => console.error('[sklad] voice utterances listener error:', err)));

  S.voice.timer = setInterval(updateVoiceTimer, 1000);
}
function stopVoice(){
  if (S.voice.recog){ try { S.voice.recog.onend = null; S.voice.recog.stop(); } catch{} S.voice.recog = null; }
  S.voice.mic = false;
  if (S.voice.timer){ clearInterval(S.voice.timer); S.voice.timer = null; }
  if (S.voice.hb){ clearInterval(S.voice.hb); S.voice.hb = null; }
  (S.voice.unsubs || []).forEach(u => { try { u(); } catch{} });
  S.voice.unsubs = [];
  if (S.voice.meRef){ try { remove(S.voice.meRef); } catch{} S.voice.meRef = null; }
  try { window.speechSynthesis.cancel(); } catch{}
  S.voice.speakQ = []; S.voice.speaking = false;
  stopCall();
  S.voice.callReady = false;
}

// ── WEBRTC (live video mesh; signaling via Firebase inbox) ──
function rtcInbox(uid){ return ref(S.db, `rooms/${S.roomId}/voice/rtc/${uid}/inbox`); }
async function startCall(){
  if (S.voice.callReady) return;
  try {
    S.voice.localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    S.voice.camOn = true;
  } catch(e){
    console.warn('[sklad] camera unavailable:', e);
    S.voice.localStream = null; S.voice.camOn = false;
    toast('📷 Câmera indisponível. A tradução por voz continua funcionando.');
  }
  // fresh signaling inbox, auto-removed on disconnect
  try { await remove(rtcInbox(S.user.id)); } catch{}
  try { onDisconnect(ref(S.db, `rooms/${S.roomId}/voice/rtc/${S.user.id}`)).remove(); } catch{}
  if (!S.voice.inboxUnsub){
    S.voice.inboxUnsub = onChildAdded(rtcInbox(S.user.id), snap => {
      const msg = snap.val(); try { remove(snap.ref); } catch{}
      if (msg && msg.from && msg.from !== S.user.id) handleSignal(msg.from, msg);
    }, err => console.error('[sklad] rtc inbox error:', err));
  }
  S.voice.callReady = true;
  updateCamUI(); renderVoiceParticipants();
  reconcilePeers();
}
function reconcilePeers(){
  if (!S.voice.callReady || !S.user) return;
  const present = new Set((S.voice.live || []).map(p => p.id));
  for (const id of present){
    if (id === S.user.id) continue;
    if (!S.voice.peers[id]) ensurePeer(id, S.user.id > id); // higher uid initiates → avoids glare
  }
  for (const id of Object.keys(S.voice.peers)){ if (!present.has(id)) closePeer(id); }
}
function ensurePeer(id, initiator){
  if (S.voice.peers[id]) return S.voice.peers[id];
  const pc = new RTCPeerConnection(ICE_SERVERS);
  const peer = { pc, pending: [], hasRemote: false, stream: null };
  S.voice.peers[id] = peer;
  if (S.voice.localStream){ S.voice.localStream.getTracks().forEach(t => pc.addTrack(t, S.voice.localStream)); }
  pc.onicecandidate = e => { if (e.candidate) sendSignal(id, { type: 'candidate', candidate: e.candidate.toJSON() }); };
  pc.ontrack = e => { peer.stream = e.streams[0]; renderVoiceParticipants(); };
  if (initiator){
    pc.createOffer().then(o => pc.setLocalDescription(o))
      .then(() => sendSignal(id, { type: 'offer', sdp: { type: pc.localDescription.type, sdp: pc.localDescription.sdp } }))
      .catch(e => console.error('[sklad] offer failed:', e));
  }
  return peer;
}
async function handleSignal(from, msg){
  const peer = ensurePeer(from, false);
  const pc = peer.pc;
  try {
    if (msg.type === 'offer'){
      await pc.setRemoteDescription(msg.sdp); peer.hasRemote = true; await flushCandidates(peer);
      const ans = await pc.createAnswer(); await pc.setLocalDescription(ans);
      sendSignal(from, { type: 'answer', sdp: { type: pc.localDescription.type, sdp: pc.localDescription.sdp } });
    } else if (msg.type === 'answer'){
      await pc.setRemoteDescription(msg.sdp); peer.hasRemote = true; await flushCandidates(peer);
    } else if (msg.type === 'candidate'){
      if (peer.hasRemote) { try { await pc.addIceCandidate(msg.candidate); } catch{} }
      else peer.pending.push(msg.candidate);
    }
  } catch(e){ console.error('[sklad] signal handling failed:', e); }
}
async function flushCandidates(peer){
  for (const c of peer.pending){ try { await peer.pc.addIceCandidate(c); } catch{} }
  peer.pending = [];
}
function sendSignal(toId, payload){
  try { push(rtcInbox(toId), { from: S.user.id, ...payload, ts: serverTimestamp() }); }
  catch(e){ console.error('[sklad] sendSignal failed:', e); }
}
function closePeer(id){
  const peer = S.voice.peers[id]; if (!peer) return;
  try { peer.pc.close(); } catch{}
  delete S.voice.peers[id];
  renderVoiceParticipants();
}
function stopCall(){
  Object.keys(S.voice.peers).forEach(closePeer);
  S.voice.peers = {};
  if (S.voice.inboxUnsub){ try { S.voice.inboxUnsub(); } catch{} S.voice.inboxUnsub = null; }
  if (S.voice.localStream){ try { S.voice.localStream.getTracks().forEach(t => t.stop()); } catch{} S.voice.localStream = null; }
  S.voice.camOn = false;
  if (S.db && S.user && S.roomId){ try { remove(ref(S.db, `rooms/${S.roomId}/voice/rtc/${S.user.id}`)); } catch{} }
}
function toggleCam(){
  if (!S.voice.localStream){ startCall(); return; }
  const vt = S.voice.localStream.getVideoTracks()[0];
  if (vt){ vt.enabled = !vt.enabled; S.voice.camOn = vt.enabled; }
  updateCamUI(); renderVoiceParticipants();
}
function updateCamUI(){
  const b = document.getElementById('vCam');
  if (b) b.classList.toggle('off', !S.voice.camOn);
}

// First person to go live sets the shared 10-min clock and records the host's plan.
async function startVoiceSession(){
  if (S.voice.session && S.voice.session.startedAt) return;
  try { await update(voiceRef('session'), { startedAt: serverTimestamp(), hostId: S.user.id, hostPro: isPro(), open: true }); }
  catch(e){ console.error('[sklad] voice session start failed:', e); }
}

function micToggle(){
  if (S.voice.closed) return;
  unlockAudio();
  if (!SR){ toast('🎤 O microfone ao vivo precisa de Chrome ou Edge.'); return; }
  if (S.voice.mic) stopMic(); else goLive();
}
async function goLive(){
  await startVoiceSession();
  S.voice.mic = true;
  if (S.voice.meRef) set(S.voice.meRef, S.voice.liveWrite()).catch(()=>{});
  startVoiceRecog();
  updateMicRoomUI();
}
function stopMic(){
  S.voice.mic = false;
  if (S.voice.recog){ try { S.voice.recog.onend = null; S.voice.recog.stop(); } catch{} S.voice.recog = null; }
  if (S.voice.meRef) set(S.voice.meRef, S.voice.liveWrite()).catch(()=>{});
  updateMicRoomUI();
}
function startVoiceRecog(){
  if (!SR || !S.voice.mic || S.voice.speaking) return; // don't capture our own TTS
  const rec = new SR();
  rec.lang = SPEECH_LANG[S.user.lang] || 'pt-BR';
  rec.continuous = true; rec.interimResults = true;
  rec.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t; else interim += t;
    }
    showOwnCaption(interim);
    if (final.trim()){ showOwnCaption(''); pushUtterance(final.trim()); }
  };
  rec.onerror = () => {};
  rec.onend = () => { if (S.voice.mic && !S.voice.speaking){ try { rec.start(); } catch{} } };
  S.voice.recog = rec;
  try { rec.start(); } catch(e){}
}
async function pushUtterance(text){
  try {
    const k = push(voiceRef('utterances')).key;
    await set(voiceRef(`utterances/${k}`), { authorId: S.user.id, authorName: S.user.name, text: text.slice(0,2000), ts: serverTimestamp() });
  } catch(e){ console.error('[sklad] utterance failed:', e); }
}

async function handleIncomingUtterance(u){
  if (u.authorId === S.user.id) return; // never re-speak my own voice
  const ml = S.user.lang;
  const res = await translateMessage(u.text, ml);
  const translated = (res && res.translated) || u.text;
  pushCaption(u, translated);
  enqueueSpeak(translated, ml);
}
function enqueueSpeak(text, lang){ S.voice.speakQ.push({ text, lang }); drainSpeak(); }
function drainSpeak(){
  if (S.voice.speaking) return;
  const next = S.voice.speakQ.shift();
  if (!next){ // queue drained → resume listening if still live
    if (S.voice.mic && !S.voice.recog) startVoiceRecog();
    return;
  }
  if (!TTS_OK){ drainSpeak(); return; }
  S.voice.speaking = true;
  // duck: pause our own mic while the translation plays, to avoid echo loops
  if (S.voice.recog){ try { S.voice.recog.onend = null; S.voice.recog.stop(); } catch{} S.voice.recog = null; }
  let done = false;
  const finish = () => { if (done) return; done = true; S.voice.speaking = false; drainSpeak(); };
  try {
    window.speechSynthesis.resume(); // Chrome can silently pause the queue; nudge it
    const utt = new SpeechSynthesisUtterance(next.text);
    const v = pickVoice(next.lang); if (v) utt.voice = v;
    utt.lang = SPEECH_LANG[next.lang] || next.lang;
    utt.onend = finish; utt.onerror = finish;
    window.speechSynthesis.speak(utt);
    // safety net: some browsers never fire onend, which would freeze the queue
    setTimeout(finish, Math.min(15000, 1800 + next.text.length * 90));
  } catch { finish(); }
}

function elapsedVoice(){ const s = S.voice.session; return (s && s.startedAt) ? Date.now() - s.startedAt : 0; }
function updateVoiceTimer(){
  const el = document.getElementById('vTimer'); if (!el) return;
  const s = S.voice.session;
  if (s && s.hostPro){ el.textContent = '∞ PRO'; el.className = 'voice-timer pro'; return; }
  if (!s || !s.startedAt){ el.textContent = '10:00'; el.className = 'voice-timer'; return; }
  const remain = Math.max(0, VOICE_FREE_MS - elapsedVoice());
  const m = Math.floor(remain / 60000), sec = Math.floor((remain % 60000) / 1000);
  el.textContent = `${m}:${String(sec).padStart(2,'0')}`;
  el.className = 'voice-timer' + (remain < 60000 ? ' low' : '');
  if (remain <= 0) closeVoiceRoom();
}
async function closeVoiceRoom(){
  try { if (S.voice.session && S.voice.session.open !== false) await update(voiceRef('session'), { open: false }); } catch{}
  onVoiceClosed();
}
function onVoiceClosed(){
  if (S.voice.closed) return;
  S.voice.closed = true;
  if (S.voice.recog){ try { S.voice.recog.onend = null; S.voice.recog.stop(); } catch{} S.voice.recog = null; }
  S.voice.mic = false;
  try { window.speechSynthesis.cancel(); } catch{}
  if (S.screen === 'voice') render();
}

function renderVoiceParticipants(){
  const el = document.getElementById('vTiles'); if (!el) return;
  const list = (S.voice.live || []);
  if (!list.length){ el.innerHTML = '<div class="vt-empty">Ninguém na sala de voz ainda.</div>'; return; }
  el.innerHTML = list.map(u => {
    const idx = (typeof u.color === 'number') ? u.color % PALETTE.length : paletteIdxFor(u.id);
    const c = PALETTE[idx];
    const me = u.id === S.user.id;
    return `<div class="voice-tile ${u.speaking ? 'speaking' : ''}" data-uid="${u.id}">
      <video class="vtile-video" id="vid_${u.id}" autoplay playsinline${me ? ' muted' : ''}></video>
      <div class="vtile-av" style="background:${c.avBg};color:${c.av}">${initials(u.name)}</div>
      <div class="vtile-foot">
        <span class="vtile-name">${esc(u.name)}${me ? ' (você)' : ''}</span>
        <span class="vtile-lang">${LANGS[u.lang] ? LANGS[u.lang].flag : '🌐'}</span>
      </div>
    </div>`;
  }).join('');
  // attach media streams (cannot be set through innerHTML)
  for (const u of list){
    const v = document.getElementById('vid_' + u.id); if (!v) continue;
    const tile = v.closest('.voice-tile');
    const stream = (u.id === S.user.id) ? S.voice.localStream : (S.voice.peers[u.id] && S.voice.peers[u.id].stream);
    const show = (u.id === S.user.id) ? (stream && S.voice.camOn) : !!stream;
    if (show){ if (v.srcObject !== stream) v.srcObject = stream; tile && tile.classList.add('has-video'); }
    else { v.srcObject = null; tile && tile.classList.remove('has-video'); }
  }
}
function pushCaption(u, translated){
  S.voice.caps = S.voice.caps || [];
  S.voice.caps.push({ name: u.authorName, id: u.authorId, original: u.text, translated });
  S.voice.caps = S.voice.caps.slice(-6);
  renderCaptions();
}
function renderCaptions(){
  const el = document.getElementById('vCaption'); if (!el) return;
  const caps = S.voice.caps || [];
  if (!caps.length){ const lang = LANGS[S.user.lang]; el.innerHTML = `<div class="vc-empty">As falas aparecem aqui, traduzidas para ${lang.flag} ${lang.name}.</div>`; return; }
  el.innerHTML = caps.map(c => {
    const idx = paletteIdxFor(c.id); const col = PALETTE[idx];
    return `<div class="vcap">
      <span class="vcap-name" style="color:${col.av}">${esc(c.name)}</span>
      <span class="vcap-text">${esc(c.translated)}</span>
      <span class="vcap-orig">${esc(c.original)}</span>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}
function showOwnCaption(text){
  const el = document.getElementById('vOwnCap'); if (!el) return;
  el.textContent = text || '';
  el.classList.toggle('on', !!text);
}
function updateMicRoomUI(){
  const b = document.getElementById('vMic'); const lbl = document.getElementById('vMicLabel');
  if (b){ b.classList.toggle('live', !!S.voice.mic); b.innerHTML = S.voice.mic ? MIC_ON_SVG : MIC_OFF_SVG; }

// ── RENDER MESSAGES ───────────────────────────
function renderMsgs(){
  const list = document.getElementById('msgList');
  const empty = document.getElementById('emptyState');
  console.log(`[sklad] 🎨 renderMsgs called — ${S.messages.length} messages in state, list element exists: ${!!list}`);
  if (!list) return;
  if (S.messages.length === 0) { list.innerHTML=''; if(empty) empty.style.display='flex'; return; }
  if (empty) empty.style.display = 'none';

  const ml = S.user.lang;
  let lastDate = null;
  let html = '';

  for (const msg of S.messages) {
    const isOwn = msg.authorId === S.user.id || msg.authorName === S.user.name;
    const ck = `${msg.text}|||${ml}`;
    const xl = S.cache[ck]; // {detected, translated} | undefined
    const pending = !xl && S.pending.has(ck);
    const detected = xl?.detected || null;
    const wasTranslated = xl && xl.detected !== ml;
    const displayText = xl ? xl.translated : msg.text;
    const detLang = detected ? (LANGS[detected] || {name: detected, flag: '🌐'}) : null;
    const msgDate = new Date(msg.ts || Date.now()).toDateString();

    if (msgDate !== lastDate) {
      html += `<div class="date-sep"><span>${fmtDate(msg.ts || Date.now())}</span></div>`;
      lastDate = msgDate;
    }

    if (isOwn) {
      const origLine = (wasTranslated)
        ? `<div style="font-size:11.5px;opacity:.5;margin-top:6px;font-style:italic;padding-top:6px;border-top:1px solid rgba(255,255,255,.12)">${esc(msg.text)}</div>`
        : '';
      const loadLine = pending
        ? `<div style="display:flex;align-items:center;gap:6px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.12)"><div class="dots" style="filter:brightness(3)"><span></span><span></span><span></span></div><span style="font-size:11px;opacity:.5">traduzindo…</span></div>`
        : '';
      html += `
      <div class="msg-group">
        <div class="msg-right">
          <div class="bubble-own">${esc(displayText)}${origLine}${loadLine}</div>
          <div class="own-time">${fmtTime(msg.ts || Date.now())}</div>
        </div>
      </div>`;
    } else {
      const col = userColor(msg.authorId);
      let xlHTML = '';
      if (wasTranslated) {
        xlHTML = `
          <div class="xl-divider"></div>
          <div class="xl-badge">${detLang.flag} ↳ original em ${detLang.name}</div>
          <div class="xl-original">${esc(msg.text)}</div>`;
      } else if (pending) {
        xlHTML = `
          <div class="xl-loading">
            <div class="dots"><span></span><span></span><span></span></div>
            <span style="font-size:11px;color:var(--t3)">traduzindo…</span>
          </div>`;
      }
      const langFlag = detLang ? detLang.flag : '';
      html += `
      <div class="msg-group">
        <div class="msg-left">
          <div class="msg-av" style="background:${col.avBg};color:${col.av}">${initials(msg.authorName)}</div>
          <div class="msg-content">
            <div class="msg-meta">
              <span class="msg-name">${esc(msg.authorName)}</span>
              ${langFlag ? `<span class="msg-lang-flag">${langFlag}</span>` : ''}
              <span class="msg-time">${fmtTime(msg.ts || Date.now())}</span>
            </div>
            <div class="bubble" style="background:${col.bg};border-color:${col.bd}">
              ${esc(displayText)}${xlHTML}
            </div>
          </div>
        </div>
      </div>`;
    }
  }

  list.innerHTML = html;
  const area = document.getElementById('msgsArea');
  if (area) area.scrollTop = area.scrollHeight;
}

// ── RENDER PARTICIPANTS ───────────────────────
function renderParticipants(){
  const el = document.getElementById('sbParts');
  if (!el || !S.user) return;
  // Real presence: everyone currently connected to the room (minus me).
  const others = (S.participants || []).filter(p => p.id !== S.user.id);
  if (!others.length){ el.innerHTML='<div style="font-size:12px;color:var(--t3)">Aguardando participantes…</div>'; return; }
  const ml = S.user.lang;
  // most recent message per author → detect the language they write in
  const lastByAuthor = {};
  for (const msg of S.messages) lastByAuthor[msg.authorId] = msg;
  el.innerHTML = others.map(u => {
    const col = userColor(u.id);
    let sub = (u.lang && LANGS[u.lang]) ? `lê em ${LANGS[u.lang].flag} ${LANGS[u.lang].name}` : 'online';
    const last = lastByAuthor[u.id];
    if (last){
      const det = S.cache[`${last.text}|||${ml}`]?.detected;
      if (det && LANGS[det]) sub = `escreve em ${LANGS[det].flag} ${LANGS[det].name}`;
    }
    return `
      <div class="participant">
        <div class="p-av" style="background:${col.avBg};color:${col.av}">${initials(u.name)}</div>
        <div class="p-info">
          <div class="p-name">${esc(u.name)}</div>
          <div class="p-lang">${sub}</div>
        </div>
      </div>`;
  }).join('');
}

// ── BOOT ──────────────────────────────────────
(async function boot(){
  let cfg = null;
  if (EMBEDDED_CFG && EMBEDDED_CFG.databaseURL) {
    cfg = EMBEDDED_CFG;
  } else {
    const { cfg: urlCfg } = parseHash();
    if (urlCfg) {
      cfg = decodeConfigFromURL(urlCfg);
      if (cfg) saveCfg(cfg);
    }
    if (!cfg) cfg = loadCfg();
  }

  // Saved identity → skip the name/language screen on return visits.
  let savedName = null, savedLang = null, savedColor = null;
  try {
    savedName = localStorage.getItem(NAME_KEY);
    savedLang = localStorage.getItem(LANG_KEY);
    const c = localStorage.getItem(COLOR_KEY); if (c != null) savedColor = parseInt(c, 10);
  } catch {}
  if (!Number.isInteger(savedColor)) savedColor = null;
  const hasSaved = savedName && savedLang && LANGS[savedLang];

  if (cfg && initFb(cfg)) {
    watchConnection();
    S.screen = hasSaved ? 'loading' : 'id';
    render();
    let user = null;
    try { user = await ensureAuth(); } catch { user = null; }
    if (!user) {
      toast('⚠️ Falha na autenticação. Ative o login Anônimo no Firebase Auth.');
      S.screen = 'id'; render();
    } else if (hasSaved) {
      S.user = { id: user.uid, name: savedName, lang: savedLang, color: savedColor };
      S.roomId = getOrMakeRoom();
      updateURLHash();
      S.screen = 'chat'; render(); listenMessages(); startPresence();
    }
    // otherwise: stay on the identity screen; join() reuses the signed-in user
  } else {
    S.screen = 'setup'; render();
  }

  // Reconnect listeners + presence when the tab comes back (mobile/desktop tab switching)
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && S.screen === 'chat' && S.db && S.roomId) {
      listenMessages(); startPresence();
    }
  });
  window.addEventListener('focus', () => {
    if (S.screen === 'chat' && S.db && S.roomId) { listenMessages(); startPresence(); }
  });
})();
</script>
